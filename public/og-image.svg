  <text x="92" y="500" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" fill="#c9c9d4">Bağlantıyı yapıştır · Tek tıkla MP4, GIF ve görsel indir</text>

  <g transform="translate(90,540)" fill="#e9e9f0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">
