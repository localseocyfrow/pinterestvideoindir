<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 128" role="img" aria-label="pinterestvideoindirme Pinterest video indirme aracı logosu">
  <defs>
    <linearGradient id="pviLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2d52"/>
      <stop offset="1" stop-color="#bd081c"/>
    </linearGradient>
  </defs>
  <!-- Icon badge -->
  <g transform="translate(6 12) scale(0.8125)">
    <rect width="128" height="128" rx="30" fill="url(#pviLogo)"/>
    <g fill="#fff">
      <rect x="55" y="26" width="18" height="36" rx="9"/>
      <path d="M40 58 L88 58 L64 90 Z" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
      <rect x="38" y="98" width="52" height="12" rx="6"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="126" y="64" dominant-baseline="central" text-anchor="start"
    font-family="'Segoe UI Rounded','SF Pro Rounded',Nunito,'Segoe UI',system-ui,Roboto,Arial,sans-serif"
    font-size="46" font-weight="800" letter-spacing="-1">
    <tspan fill="#14141a">pinterest</tspan><tspan fill="#e60023">video</tspan><tspan fill="#14141a">indirme</tspan>
  </text>
</svg>
